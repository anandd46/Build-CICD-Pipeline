# ──────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — GitHub Actions
# Triggers on every push to main and on pull requests targeting main.
# The pipeline runs unit tests, builds and validates a Docker image, then
# deploys the new image to an AWS EC2 instance over SSH.
# ──────────────────────────────────────────────────────────────────────────────
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same ref so only the latest commit runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: cicd-flask-app
  CONTAINER_NAME: flask-app
  APP_PORT: 5000

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Test
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Stage 1 — Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Stage 2 — Set up Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # Stage 3 — Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Stage 4 — Run unit tests
      - name: Run unit tests
        run: |
          pytest test_app.py -v --tb=short --cov=app --cov-report=term-missing
        env:
          APP_ENV: testing

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build Docker image (runs only when test job passes)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Validate Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      # Stage 1 — Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Stage 5 — Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            .

      # Stage 6 — Verify Docker build
      - name: Verify Docker build
        run: |
          # Start container in detached mode and wait for it to be healthy
          docker run -d \
            --name test-container \
            -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
            -e APP_ENV=ci \
            ${{ env.IMAGE_NAME }}:latest

          # Give Gunicorn a moment to bind
          sleep 8

          # Confirm the health endpoint responds with HTTP 200
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ env.APP_PORT }}/health)
          echo "Health check returned: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed — dumping container logs:"
            docker logs test-container
            exit 1
          fi

          echo "Docker build verified successfully."
          docker stop test-container
          docker rm test-container

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to EC2 (runs only on pushes to main, after build passes)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Stage 1 — Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Stage 7 — Configure SSH key for EC2 access
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Stage 8 — Pull latest code on EC2
      - name: Pull latest code on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
              "cd ~/cicd-pipeline && git pull origin main"

      # Stage 9 — Stop existing container
      - name: Stop existing container
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
              "docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true && \
               docker rm   ${{ env.CONTAINER_NAME }} 2>/dev/null || true"

      # Stage 10 — Build new Docker image on EC2
      - name: Build new Docker image on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
              "cd ~/cicd-pipeline && docker build -t ${{ env.IMAGE_NAME }}:latest ."

      # Stage 11 — Start new container
      - name: Start new container
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
              "docker run -d \
                --name ${{ env.CONTAINER_NAME }} \
                --restart unless-stopped \
                -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
                -e APP_ENV=production \
                ${{ env.IMAGE_NAME }}:latest"

      # Stage 12 — Health check
      - name: Verify deployment health
        run: |
          sleep 10

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}:${{ env.APP_PORT }}/health)
          echo "Remote health check: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Deployment health check failed."
            exit 1
          fi

          echo "Deployment verified. Application is live at http://${{ secrets.EC2_HOST }}:${{ env.APP_PORT }}"

      # Cleanup SSH credentials after the job
      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
