version: "3.9"

services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cicd-flask-app:latest
    container_name: flask-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment: 
      - APP_ENV=production
      - PORT=5000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
